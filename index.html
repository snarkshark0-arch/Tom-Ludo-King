<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚔️ 2-Player Battle Arena</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(145deg, #0a0a1a, #1a0a2e, #0d0d2b);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            padding: 1.2rem;
        }
        .game-container {
            background: #16163a;
            border-radius: 3.5rem;
            padding: 2rem 2rem 2.5rem;
            max-width: 720px;
            width: 100%;
            box-shadow: 0 30px 60px rgba(0,0,0,0.9), inset 0 0 0 1px rgba(255,255,255,0.05);
            border: 1px solid #4a4a7a;
        }
        .game-title {
            text-align: center;
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: 3px;
            color: #f7e05e;
            text-shadow: 0 0 30px #f7b32b77, 0 4px 0 #7a5a1a;
            margin-bottom: 0.3rem;
        }
        .game-title small {
            font-size: 1rem;
            background: #2a2a5a;
            padding: 0.2rem 1.6rem;
            border-radius: 60px;
            color: #c8c8ff;
            letter-spacing: 2px;
            display: inline-block;
            margin-top: 0.2rem;
        }
        .players-row {
            display: flex;
            justify-content: space-between;
            gap: 0.8rem;
            margin: 1.2rem 0 1.5rem;
        }
        .player-box {
            flex: 1;
            background: #12122e;
            border-radius: 2rem;
            padding: 1rem 0.5rem;
            text-align: center;
            border: 2px solid #3a3a6a;
            transition: 0.2s;
        }
        .player-box.active {
            border-color: #f7c948;
            box-shadow: 0 0 30px #f7b32b44;
            background: #1a1a44;
        }
        .player-box .name {
            font-weight: 700;
            font-size: 1.3rem;
            color: #eaeaff;
        }
        .player-box .score {
            font-size: 2.8rem;
            font-weight: 800;
            color: #f7e05e;
            margin: 0.2rem 0;
        }
        .player-box .hp-bar {
            background: #0a0a1a;
            border-radius: 60px;
            height: 12px;
            width: 80%;
            margin: 0.3rem auto;
            overflow: hidden;
            border: 1px solid #4a4a7a;
        }
        .player-box .hp-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d);
            transition: width 0.3s ease;
            border-radius: 60px;
        }
        .player-box .hp-text {
            font-size: 0.8rem;
            color: #aab;
        }
        .vs-badge {
            display: flex;
            align-items: center;
            font-size: 2rem;
            font-weight: 900;
            color: #ff6b6b;
            text-shadow: 0 0 20px #ff6b6b66;
            padding: 0 0.2rem;
        }
        .status-area {
            background: #0f0f2a;
            border-radius: 60px;
            padding: 0.8rem 1.5rem;
            text-align: center;
            color: #eaeaff;
            font-weight: 500;
            min-height: 4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            border: 1px solid #4a4a7a;
            margin: 1rem 0 1.5rem;
        }
        .status-area .turn-badge {
            background: #2d2d70;
            padding: 0.3rem 1.5rem;
            border-radius: 60px;
            color: #ffd966;
            font-weight: 600;
        }
        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin: 0.8rem 0;
        }
        .action-btn {
            background: #2a2a5e;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.2rem;
            color: white;
            box-shadow: 0 6px 0 #12122e, 0 4px 18px #00000077;
            transition: 0.06s linear;
            cursor: pointer;
            border: 1px solid #5a5a9a;
            min-width: 110px;
        }
        .action-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #12122e;
        }
        .action-btn:disabled {
            opacity: 0.4;
            transform: translateY(4px);
            box-shadow: 0 2px 0 #12122e;
            pointer-events: none;
        }
        .action-btn.attack { background: #c0392b; border-color: #e74c3c; }
        .action-btn.heal { background: #27ae60; border-color: #2ecc71; }
        .action-btn.defend { background: #2980b9; border-color: #3498db; }
        .reset-btn {
            background: #3a3a7a;
            border: none;
            color: white;
            font-weight: 600;
            padding: 0.6rem 2.8rem;
            border-radius: 60px;
            font-size: 1.1rem;
            box-shadow: 0 6px 0 #1a1a44;
            transition: 0.06s linear;
            cursor: pointer;
            border: 1px solid #6a6aaa;
            margin-top: 0.4rem;
        }
        .reset-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #1a1a44;
        }
        .log-area {
            background: #0a0a1e;
            border-radius: 30px;
            padding: 0.8rem 1.2rem;
            margin-top: 1.2rem;
            color: #b0b0e0;
            font-size: 0.9rem;
            min-height: 2.8rem;
            border: 1px solid #333366;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        @media (max-width: 500px) {
            .game-title { font-size: 2rem; }
            .players-row { flex-direction: column; }
            .vs-badge { padding: 0.2rem 0; }
            .action-btn { min-width: 80px; padding: 0.6rem 1.2rem; font-size: 1rem; }
        }
        .winner-glow {
            color: #f7e05e;
            text-shadow: 0 0 30px #f7b32b, 0 0 60px #f7b32b55;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-title">
        ⚔️ ARENA
        <small>2 Players</small>
    </div>

    <!-- Players -->
    <div class="players-row">
        <div class="player-box active" id="player1Box">
            <div class="name">⚔️ Player 1</div>
            <div class="score" id="p1Score">0</div>
            <div class="hp-bar"><div class="hp-fill" id="p1HpFill" style="width:100%"></div></div>
            <div class="hp-text"><span id="p1HpText">100</span> HP</div>
        </div>
        <div class="vs-badge">⚡</div>
        <div class="player-box" id="player2Box">
            <div class="name">🛡️ Player 2</div>
            <div class="score" id="p2Score">0</div>
            <div class="hp-bar"><div class="hp-fill" id="p2HpFill" style="width:100%"></div></div>
            <div class="hp-text"><span id="p2HpText">100</span> HP</div>
        </div>
    </div>

    <!-- Status -->
    <div class="status-area" id="statusArea">
        <span class="turn-badge" id="turnBadge">🎯 Player 1</span>
        <span id="statusMessage">Choose your action!</span>
    </div>

    <!-- Action Buttons -->
    <div class="action-buttons">
        <button class="action-btn attack" id="attackBtn">⚔️ Attack</button>
        <button class="action-btn heal" id="healBtn">💚 Heal</button>
        <button class="action-btn defend" id="defendBtn">🛡️ Defend</button>
    </div>

    <!-- Reset -->
    <div style="display: flex; justify-content: center;">
        <button class="reset-btn" id="resetBtn">🔄 New Battle</button>
    </div>

    <!-- Log -->
    <div class="log-area" id="logArea">⚔️ Battle begins! Player 1 goes first.</div>
</div>

<script>
    (function BattleArena() {
        // -------------------- STATE --------------------
        const MAX_HP = 100;
        let state = {
            players: [
                { hp: MAX_HP, score: 0, isDefending: false },
                { hp: MAX_HP, score: 0, isDefending: false }
            ],
            turn: 0,          // 0 = Player 1, 1 = Player 2
            gameOver: false,
            waitingForAction: true,
            battleLog: []
        };

        // DOM elements
        const p1Box = document.getElementById('player1Box');
        const p2Box = document.getElementById('player2Box');
        const p1Score = document.getElementById('p1Score');
        const p2Score = document.getElementById('p2Score');
        const p1HpFill = document.getElementById('p1HpFill');
        const p2HpFill = document.getElementById('p2HpFill');
        const p1HpText = document.getElementById('p1HpText');
        const p2HpText = document.getElementById('p2HpText');
        const turnBadge = document.getElementById('turnBadge');
        const statusMsg = document.getElementById('statusMessage');
        const logArea = document.getElementById('logArea');
        const attackBtn = document.getElementById('attackBtn');
        const healBtn = document.getElementById('healBtn');
        const defendBtn = document.getElementById('defendBtn');
        const resetBtn = document.getElementById('resetBtn');

        // -------------------- HELPERS --------------------
        function updateUI() {
            // Update HP bars & text
            const p1 = state.players[0];
            const p2 = state.players[1];
            p1HpFill.style.width = Math.max(0, (p1.hp / MAX_HP) * 100) + '%';
            p2HpFill.style.width = Math.max(0, (p2.hp / MAX_HP) * 100) + '%';
            p1HpText.textContent = Math.max(0, p1.hp);
            p2HpText.textContent = Math.max(0, p2.hp);
            p1Score.textContent = p1.score;
            p2Score.textContent = p2.score;

            // Active player highlight
            p1Box.classList.toggle('active', state.turn === 0 && !state.gameOver);
            p2Box.classList.toggle('active', state.turn === 1 && !state.gameOver);

            // Turn badge
            const playerName = state.turn === 0 ? 'Player 1' : 'Player 2';
            turnBadge.textContent = `🎯 ${playerName}`;

            // Buttons
            const isGameOver = state.gameOver;
            const isMyTurn = state.waitingForAction && !isGameOver;
            attackBtn.disabled = !isMyTurn;
            healBtn.disabled = !isMyTurn;
            defendBtn.disabled = !isMyTurn;

            // Status message
            if (isGameOver) {
                const winnerIdx = state.players[0].hp <= 0 ? 1 : (state.players[1].hp <= 0 ? 0 : -1);
                if (winnerIdx !== -1) {
                    statusMsg.innerHTML = `🏆 <span class="winner-glow">Player ${winnerIdx+1} WINS!</span> 🏆`;
                    logArea.textContent = `🏆 Player ${winnerIdx+1} wins the battle!`;
                } else {
                    statusMsg.textContent = '⚖️ Draw! Both players defeated.';
                    logArea.textContent = '⚖️ It\'s a draw!';
                }
                return;
            }

            statusMsg.textContent = state.waitingForAction ? `Choose your action!` : `⏳ Processing...`;
        }

        function addLog(msg) {
            logArea.textContent = msg;
        }

        function checkGameOver() {
            const p1 = state.players[0];
            const p2 = state.players[1];
            if (p1.hp <= 0 || p2.hp <= 0) {
                state.gameOver = true;
                state.waitingForAction = false;
                // Award score to winner
                if (p1.hp <= 0 && p2.hp <= 0) {
                    // draw
                } else if (p1.hp <= 0) {
                    state.players[1].score += 1;
                } else {
                    state.players[0].score += 1;
                }
                updateUI();
                return true;
            }
            return false;
        }

        // Switch turn
        function nextTurn() {
            if (state.gameOver) return;
            state.turn = state.turn === 0 ? 1 : 0;
            state.waitingForAction = true;
            // Clear defend status from both
            state.players[0].isDefending = false;
            state.players[1].isDefending = false;
            updateUI();
            addLog(`🔄 ${state.turn === 0 ? 'Player 1' : 'Player 2'}'s turn`);
        }

        // -------------------- ACTIONS --------------------
        function performAction(action) {
            if (state.gameOver || !state.waitingForAction) return;

            const attacker = state.turn;
            const defender = attacker === 0 ? 1 : 0;
            const atk = state.players[attacker];
            const def = state.players[defender];
            let logMsg = '';

            // Disable buttons during action
            state.waitingForAction = false;
            updateUI();

            // ---- ATTACK ----
            if (action === 'attack') {
                let damage = Math.floor(Math.random() * 20) + 15; // 15-34
                // if defender is defending, reduce damage by 50%
                if (def.isDefending) {
                    damage = Math.floor(damage * 0.5);
                    logMsg = `🛡️ ${defender === 0 ? 'Player 1' : 'Player 2'} defended! Damage halved.`;
                }
                def.hp = Math.max(0, def.hp - damage);
                logMsg = `⚔️ Player ${attacker+1} attacked for ${damage} damage! ${logMsg}`;
                addLog(logMsg);
            }
            // ---- HEAL ----
            else if (action === 'heal') {
                const healAmt = Math.floor(Math.random() * 20) + 10; // 10-29
                const oldHp = atk.hp;
                atk.hp = Math.min(MAX_HP, atk.hp + healAmt);
                const actualHeal = atk.hp - oldHp;
                logMsg = `💚 Player ${attacker+1} healed ${actualHeal} HP!`;
                addLog(logMsg);
            }
            // ---- DEFEND ----
            else if (action === 'defend') {
                atk.isDefending = true;
                logMsg = `🛡️ Player ${attacker+1} prepares to defend!`;
                addLog(logMsg);
            }

            // Check game over after action
            if (checkGameOver()) {
                updateUI();
                return;
            }

            // Move to next turn
            setTimeout(() => {
                nextTurn();
            }, 400);
        }

        // -------------------- RESET --------------------
        function resetGame() {
            state.players = [
                { hp: MAX_HP, score: 0, isDefending: false },
                { hp: MAX_HP, score: 0, isDefending: false }
            ];
            // Preserve scores? No, full reset.
            state.players[0].score = 0;
            state.players[1].score = 0;
            state.turn = 0;
            state.gameOver = false;
            state.waitingForAction = true;
            updateUI();
            addLog('⚔️ New battle! Player 1 starts.');
            statusMsg.textContent = 'Choose your action!';
        }

        // -------------------- EVENT LISTENERS --------------------
        attackBtn.addEventListener('click', () => performAction('attack'));
        healBtn.addEventListener('click', () => performAction('heal'));
        defendBtn.addEventListener('click', () => performAction('defend'));
        resetBtn.addEventListener('click', resetGame);

        // -------------------- INIT --------------------
        resetGame();
    })();
</script>
</body>
</html>
